<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGrad" x1="100" y1="50" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="65" ry="16" fill="#cbd5e1" opacity="0.5" />

  <!-- Base Box Container -->
  <path d="M40 85 L100 60 L160 85 L100 110 Z" fill="#cbd5e1" />
  <path d="M40 85 L100 110 L100 160 L40 135 Z" fill="#94a3b8" />
  <path d="M100 110 L160 85 L160 135 L100 160 Z" fill="#64748b" />

  <!-- Flaps -->
  <path d="M40 85 L20 65 L80 40 L100 60 Z" fill="#e2e8f0" />
  <path d="M160 85 L180 65 L120 40 L100 60 Z" fill="#cbd5e1" />

  <!-- Floating Gold Coins inside glow -->
  <g style="filter:url(#goldGlow);">
    <!-- Main Central Coin -->
    <circle cx="100" cy="70" r="18" fill="url(#coinGrad)" stroke="#f59e0b" stroke-width="2" />
    <text x="100" y="77" fill="#fff" font-size="20" font-family="Arial" font-weight="bold" text-anchor="middle">₹</text>
    
    <!-- Top Smaller Coin -->
    <circle cx="115" cy="45" r="12" fill="url(#coinGrad)" opacity="0.9" />
    <circle cx="85" cy="50" r="8" fill="url(#coinGrad)" opacity="0.8" />
  </g>

  <!-- Sparkles -->
  <circle cx="65" cy="60" r="3" fill="#fbbf24" opacity="0.9" />
  <circle cx="135" cy="55" r="4" fill="#fbbf24" opacity="0.7" />
  <circle cx="145" cy="80" r="2" fill="#38bdf8" />
</svg>
