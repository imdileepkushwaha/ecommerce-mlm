<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGrad" x1="100" y1="60" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="100" y1="55" x2="100" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Ellipse Shadow -->
  <ellipse cx="100" cy="165" rx="60" ry="15" fill="#cbd5e1" opacity="0.5" />

  <!-- Main Container Base -->
  <path d="M40 85 L100 60 L160 85 L100 110 Z" fill="#cbd5e1" />
  <path d="M40 85 L100 110 L100 160 L40 135 Z" fill="#94a3b8" />
  <path d="M100 110 L160 85 L160 135 L100 160 Z" fill="#64748b" />

  <!-- Flaps / Open Cover -->
  <path d="M40 85 L20 65 L80 40 L100 60 Z" fill="#e2e8f0" />
  <path d="M160 85 L180 65 L120 40 L100 60 Z" fill="#cbd5e1" />

  <!-- Floating Heart (Core Subject) -->
  <g style="filter:url(#softGlow);">
    <path d="M100 95 C100 95 75 75 75 60 C75 50 83 42 92 42 C96 42 100 45 100 45 C100 45 104 42 108 42 C117 42 125 50 125 60 C125 75 100 95 100 95 Z" fill="url(#heartGrad)" />
  </g>
  
  <!-- Small Sparkles -->
  <circle cx="60" cy="50" r="3" fill="#fbbf24" opacity="0.8" />
  <circle cx="145" cy="45" r="4" fill="#f43f5e" opacity="0.6" />
  <circle cx="160" cy="70" r="2" fill="#38bdf8" />
</svg>
